version: '3.8'

services:
  sftpxy:
    build: .
    container_name: sftpxy
    ports:
      - "30082:30082"   # SSH/SFTP
      - "30086:30086"   # FTP
      - "30080:30080"   # WebClient
      - "30084:30084"   # WebDAV
      - "30088:30088"   # HTTP (WebAdmin/API)
    volumes:
      - ./config.yaml:/etc/sftpxy/config.yaml:ro
      - sftpxy-data:/data/sftpxy
      - sftpxy-logs:/var/log/sftpxy
    environment:
      - SFTPXY_DATA_PROVIDER_CONNECTION_STRING=/data/sftpxy/sftpxy.db
      - SFTPXY_COMMON_LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:30088/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: MySQL database
  # mysql:
  #   image: mysql:8.0
