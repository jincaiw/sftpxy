name: Deploy docs to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'README.md'
      - 'README.zh-CN.md'
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build site
        run: |
          rm -rf _site
          mkdir -p _site
          cp docs/index.html _site/
          cp docs/CNAME _site/
          cp docs/.nojekyll _site/
          cp -R docs/assets _site/
          cp -R docs/downloads _site/
          cp -R docs/install _site/
          cp -R docs/manual _site/
          cp -R docs/configuration _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
