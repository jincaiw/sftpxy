name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  id-token: write
  contents: read

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'

      - name: Install lint tools
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run golangci-lint
        run: golangci-lint run ./...

      - name: Run govulncheck
        run: govulncheck ./...

  test-deploy:
    name: Test and deploy
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        go: ['1.26.4']
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}

      - name: Build for Linux/macOS x86_64
        run: |
          go build -trimpath -tags nopgxregisterdefaulttypes,disable_grpc_modules -ldflags "-s -w -X github.com/jincaiw/sftpxy/v2/internal/version.commit=`git describe --always --abbrev=8 --dirty` -X github.com/jincaiw/sftpxy/v2/internal/version.date=`date -u +%FT%TZ`" -o SFTPxy
          cd tests/eventsearcher
          go build -trimpath -ldflags "-s -w" -o eventsearcher
          cd -
          cd tests/ipfilter
          go build -trimpath -ldflags "-s -w" -o ipfilter
          cd -
          ./SFTPxy initprovider
          ./SFTPxy resetprovider --force

      - name: Build for macOS arm64
        if: startsWith(matrix.os, 'macos-') == true
        run: CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 SDKROOT=$(xcrun --sdk macosx --show-sdk-path) go build -trimpath -tags nopgxregisterdefaulttypes,disable_grpc_modules -ldflags "-s -w -X github.com/jincaiw/sftpxy/v2/internal/version.commit=`git describe --always --abbrev=8 --dirty` -X github.com/jincaiw/sftpxy/v2/internal/version.date=`date -u +%FT%TZ`" -o SFTPxy_arm64

      - name: Run test cases using SQLite provider
        run: go test -v -tags nopgxregisterdefaulttypes,disable_grpc_modules -p 1 -timeout 15m ./... -coverprofile=coverage.txt -covermode=atomic

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.txt
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Run test cases using bolt provider
        run: |
          go test -v -tags nopgxregisterdefaulttypes,disable_grpc_modules -p 1 -timeout 2m ./internal/config -covermode=atomic
          go test -v -tags nopgxregisterdefaulttypes,disable_grpc_modules -p 1 -timeout 5m ./internal/common -covermode=atomic
          go test -v -tags nopgxregisterdefaulttypes,disable_grpc_modules -p 1 -timeout 5m ./internal/httpd -covermode=atomic
          go test -v -tags nopgxregisterdefaulttypes,disable_grpc_modules -p 1 -timeout 8m ./internal/sftpd -covermode=atomic
          go test -v -tags nopgxregisterdefaulttypes,disable_grpc_modules -p 1 -timeout 5m ./internal/ftpd -covermode=atomic
          go test -v -tags nopgxregisterdefaulttypes,disable_grpc_modules -p 1 -timeout 5m ./internal/webdavd -covermode=atomic
          go test -v -tags nopgxregisterdefaulttypes,disable_grpc_modules -p 1 -timeout 2m ./internal/telemetry -covermode=atomic
          go test -v -tags nopgxregisterdefaulttypes,disable_grpc_modules -p 1 -timeout 2m ./internal/mfa -covermode=atomic
          go test -v -tags nopgxregisterdefaulttypes,disable_grpc_modules -p 1 -timeout 2m ./internal/command -covermode=atomic
        env:
          SFTPXY_DATA_PROVIDER__DRIVER: bolt
          SFTPXY_DATA_PROVIDER__NAME: 'SFTPxy_bolt.db'

      - name: Run test cases using memory provider
        run: go test -v -tags nopgxregisterdefaulttypes,disable_grpc_modules -p 1 -timeout 15m ./... -covermode=atomic
        env:
          SFTPXY_DATA_PROVIDER__DRIVER: memory
          SFTPXY_DATA_PROVIDER__NAME: ''

      - name: Run SDK tests
        run: |
          cd sdk
          go test ./...

      - name: Prepare build artifact for macOS
        if: startsWith(matrix.os, 'macos-') == true
        run: |
          mkdir -p output/{init,bash_completion,zsh_completion}
          cp SFTPxy output/SFTPxy_x86_64
          cp SFTPxy_arm64 output/
          cp SFTPxy.json output/
          cp -r templates output/
          cp -r static output/
          cp -r openapi output/
          cp init/com.github.jincaiw.SFTPxy.plist output/init/
          ./SFTPxy gen completion bash > output/bash_completion/SFTPxy
          ./SFTPxy gen completion zsh > output/zsh_completion/_SFTPxy
          ./SFTPxy gen man -d output/man/man1
          gzip output/man/man1/*

      - name: Upload build artifact
        if: startsWith(matrix.os, 'ubuntu-') != true
        uses: actions/upload-artifact@v7
        with:
          name: SFTPxy-${{ matrix.os }}-go-${{ matrix.go }}
          path: output

  test-deploy-windows:
    name: Test and deploy Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'

      - name: Run test cases using SQLite provider
        run: |
          cd tests/eventsearcher
          go build -trimpath -ldflags "-s -w" -o eventsearcher.exe
          cd ../..
          cd tests/ipfilter
          go build -trimpath -ldflags "-s -w" -o ipfilter.exe
          cd ../..
          go test -v -tags nopgxregisterdefaulttypes,disable_grpc_modules -p 1 -timeout 15m ./... -coverprofile=coverage.txt -covermode=atomic

      - name: Run test cases using bolt provider
        run: |
          go test -v -tags nopgxregisterdefaulttypes,disable_grpc_modules -p 1 -timeout 2m ./internal/config -covermode=atomic
          go test -v -tags nopgxregisterdefaulttypes,disable_grpc_modules -p 1 -timeout 5m ./internal/common -covermode=atomic
          go test -v -tags nopgxregisterdefaulttypes,disable_grpc_modules -p 1 -timeout 5m ./internal/httpd -covermode=atomic
          go test -v -tags nopgxregisterdefaulttypes,disable_grpc_modules -p 1 -timeout 8m ./internal/sftpd -covermode=atomic
          go test -v -tags nopgxregisterdefaulttypes,disable_grpc_modules -p 1 -timeout 5m ./internal/ftpd -covermode=atomic
          go test -v -tags nopgxregisterdefaulttypes,disable_grpc_modules -p 1 -timeout 5m ./internal/webdavd -covermode=atomic
          go test -v -tags nopgxregisterdefaulttypes,disable_grpc_modules -p 1 -timeout 2m ./internal/telemetry -covermode=atomic
          go test -v -tags nopgxregisterdefaulttypes,disable_grpc_modules -p 1 -timeout 2m ./internal/mfa -covermode=atomic
          go test -v -tags nopgxregisterdefaulttypes,disable_grpc_modules -p 1 -timeout 2m ./internal/command -covermode=atomic
        env:
          SFTPXY_DATA_PROVIDER__DRIVER: bolt
          SFTPXY_DATA_PROVIDER__NAME: 'SFTPxy_bolt.db'

      - name: Run test cases using memory provider
        run: go test -v -tags nopgxregisterdefaulttypes,disable_grpc_modules -p 1 -timeout 15m ./... -covermode=atomic
        env:
          SFTPXY_DATA_PROVIDER__DRIVER: memory
          SFTPXY_DATA_PROVIDER__NAME: ''

      - name: Run SDK tests
        run: |
          cd sdk
          go test ./...

      - name: Build
        run: |
          $GIT_COMMIT = (git describe --always --abbrev=8 --dirty) | Out-String
          $DATE_TIME = ([datetime]::Now.ToUniversalTime().toString("yyyy-MM-ddTHH:mm:ssZ")) | Out-String
          $LATEST_TAG = ((git describe --tags $(git rev-list --tags --max-count=1)) | Out-String).Trim()
          $REV_LIST=$LATEST_TAG+"..HEAD"
          $COMMITS_FROM_TAG= ((git rev-list $REV_LIST --count) | Out-String).Trim()
          $FILE_VERSION = $LATEST_TAG.substring(1)  + "." + $COMMITS_FROM_TAG
          go install github.com/tc-hib/go-winres@latest
          go-winres simply --arch amd64 --product-version $LATEST_TAG-dev-$GIT_COMMIT --file-version "$FILE_VERSION" --file-description "SFTPxy server" --product-name SFTPxy --copyright "2026 jincaiw" --original-filename SFTPxy.exe --icon  .\windows-installer\icon.ico
          go build -trimpath -tags nopgxregisterdefaulttypes,disable_grpc_modules -ldflags "-s -w -X github.com/jincaiw/sftpxy/v2/internal/version.commit=$GIT_COMMIT -X github.com/jincaiw/sftpxy/v2/internal/version.date=$DATE_TIME" -o SFTPxy.exe
          mkdir arm64
          $Env:CGO_ENABLED='0'
          $Env:GOOS='windows'
          $Env:GOARCH='arm64'
          go-winres simply --arch arm64 --product-version $LATEST_TAG-dev-$GIT_COMMIT --file-version "$FILE_VERSION" --file-description "SFTPxy server" --product-name SFTPxy --copyright "2026 jincaiw" --original-filename SFTPxy.exe --icon  .\windows-installer\icon.ico
          go build -trimpath -tags nopgxregisterdefaulttypes,disable_grpc_modules,nosqlite -ldflags "-s -w -X github.com/jincaiw/sftpxy/v2/internal/version.commit=$GIT_COMMIT -X github.com/jincaiw/sftpxy/v2/internal/version.date=$DATE_TIME" -o .\arm64\SFTPxy.exe
          mkdir x86
          $Env:GOARCH='386'
          go-winres simply --arch 386 --product-version $LATEST_TAG-dev-$GIT_COMMIT --file-version "$FILE_VERSION" --file-description "SFTPxy server" --product-name SFTPxy --copyright "2026 jincaiw" --original-filename SFTPxy.exe --icon  .\windows-installer\icon.ico
          go build -trimpath -tags nopgxregisterdefaulttypes,disable_grpc_modules,nosqlite -ldflags "-s -w -X github.com/jincaiw/sftpxy/v2/internal/version.commit=$GIT_COMMIT -X github.com/jincaiw/sftpxy/v2/internal/version.date=$DATE_TIME" -o .\x86\SFTPxy.exe
          Remove-Item Env:\CGO_ENABLED
          Remove-Item Env:\GOOS
          Remove-Item Env:\GOARCH

      - name: Initialize data provider
        run: |
          rm SFTPxy.db
          ./SFTPxy initprovider
        shell: bash

      - name: Prepare Windows installers
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          choco install innosetup
          Remove-Item -LiteralPath "output" -Force -Recurse -ErrorAction Ignore
          mkdir output
          copy .\SFTPxy.exe .\output
          copy .\SFTPxy.json .\output
          copy .\SFTPxy.db .\output
          copy .\LICENSE .\output\LICENSE.txt
          copy .\NOTICE .\output\NOTICE.txt
          mkdir output\templates
          xcopy .\templates .\output\templates\ /E
          mkdir output\static
          xcopy .\static .\output\static\ /E
          mkdir output\openapi
          xcopy .\openapi .\output\openapi\ /E
          $LATEST_TAG = ((git describe --tags $(git rev-list --tags --max-count=1)) | Out-String).Trim()
          $REV_LIST=$LATEST_TAG+"..HEAD"
          $COMMITS_FROM_TAG= ((git rev-list $REV_LIST --count) | Out-String).Trim()
          $Env:SFTPXY_ISS_DEV_VERSION = $LATEST_TAG  + "." + $COMMITS_FROM_TAG
          iscc .\windows-installer\SFTPxy.iss

          rm .\output\SFTPxy.exe
          rm .\output\SFTPxy.db
          copy .\arm64\SFTPxy.exe .\output
          (Get-Content .\output\SFTPxy.json).replace('"sqlite"', '"bolt"') | Set-Content .\output\SFTPxy.json
          $Env:SFTPXY_DATA_PROVIDER__DRIVER='bolt'
          $Env:SFTPXY_DATA_PROVIDER__NAME='.\output\SFTPxy.db'
          .\SFTPxy.exe initprovider
          Remove-Item Env:\SFTPXY_DATA_PROVIDER__DRIVER
          Remove-Item Env:\SFTPXY_DATA_PROVIDER__NAME
          $Env:SFTPXY_ISS_ARCH='arm64'
          iscc .\windows-installer\SFTPxy.iss

          rm .\output\SFTPxy.exe
          copy .\x86\SFTPxy.exe .\output
          $Env:SFTPXY_ISS_ARCH='x86'
          iscc .\windows-installer\SFTPxy.iss

      - name: Upload Windows installer x86_64 artifact
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v7
        with:
          name: SFTPxy_windows_installer_x86_64
          path: ./SFTPxy_windows_x86_64.exe

      - name: Upload Windows installer arm64 artifact
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v7
        with:
          name: SFTPxy_windows_installer_arm64
          path: ./SFTPxy_windows_arm64.exe

      - name: Upload Windows installer x86 artifact
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v7
        with:
          name: SFTPxy_windows_installer_x86
          path: ./SFTPxy_windows_x86.exe

      - name: Prepare build artifact for Windows
        run: |
          Remove-Item -LiteralPath "output" -Force -Recurse -ErrorAction Ignore
          mkdir output
          copy .\SFTPxy.exe .\output
          mkdir output\arm64
          copy .\arm64\SFTPxy.exe .\output\arm64
          mkdir output\x86
          copy .\x86\SFTPxy.exe .\output\x86
          copy .\SFTPxy.json .\output
          (Get-Content .\output\SFTPxy.json).replace('"sqlite"', '"bolt"') | Set-Content .\output\SFTPxy.json
          mkdir output\templates
          xcopy .\templates .\output\templates\ /E
          mkdir output\static
          xcopy .\static .\output\static\ /E
          mkdir output\openapi
          xcopy .\openapi .\output\openapi\ /E

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: SFTPxy-windows-portable
          path: output

  test-build-flags:
    name: Test build flags
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'

      - name: Build
        run: |
          go build -trimpath -tags nopgxregisterdefaulttypes,disable_grpc_modules,nogcs,nos3,noportable,nobolt,nomysql,nopgsql,nosqlite,nometrics,noazblob,unixcrypt -ldflags "-s -w -X github.com/jincaiw/sftpxy/v2/internal/version.commit=`git describe --always --abbrev=8 --dirty` -X github.com/jincaiw/sftpxy/v2/internal/version.date=`date -u +%FT%TZ`" -o SFTPxy
          ./SFTPxy -v
          cp -r openapi static templates internal/bundle/
          go build -trimpath -tags nopgxregisterdefaulttypes,disable_grpc_modules,bundle -ldflags "-s -w -X github.com/jincaiw/sftpxy/v2/internal/version.commit=`git describe --always --abbrev=8 --dirty` -X github.com/jincaiw/sftpxy/v2/internal/version.date=`date -u +%FT%TZ`" -o SFTPxy
          ./SFTPxy -v

  test-postgresql-mysql-crdb:
    name: Test with PgSQL/MySQL/Cockroach
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: SFTPxy
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      mariadb:
        image: mariadb:latest
        env:
          MYSQL_ROOT_PASSWORD: mysql
          MYSQL_DATABASE: SFTPxy
          MYSQL_USER: SFTPxy
          MYSQL_PASSWORD: SFTPxy
        options: >-
          --health-cmd "mariadb-admin status -h 127.0.0.1 -P 3306 -u root -p$MYSQL_ROOT_PASSWORD"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6
        ports:
          - 3307:3306

      mysql:
        image: mysql:latest
        env:
          MYSQL_ROOT_PASSWORD: mysql
          MYSQL_DATABASE: SFTPxy
          MYSQL_USER: SFTPxy
          MYSQL_PASSWORD: SFTPxy
        options: >-
          --health-cmd "mysqladmin status -h 127.0.0.1 -P 3306 -u root -p$MYSQL_ROOT_PASSWORD"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6
        ports:
          - 3308:3306

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'

      - name: Build
        run: |
          go build -trimpath -tags nopgxregisterdefaulttypes,disable_grpc_modules -ldflags "-s -w -X github.com/jincaiw/sftpxy/v2/internal/version.commit=`git describe --always --abbrev=8 --dirty` -X github.com/jincaiw/sftpxy/v2/internal/version.date=`date -u +%FT%TZ`" -o SFTPxy
          cd tests/eventsearcher
          go build -trimpath -ldflags "-s -w" -o eventsearcher
          cd -
          cd tests/ipfilter
          go build -trimpath -ldflags "-s -w" -o ipfilter
          cd -

      - name: Run tests using MySQL provider
        run: |
          ./SFTPxy initprovider
          ./SFTPxy resetprovider --force
          go test -v -tags nopgxregisterdefaulttypes,disable_grpc_modules -p 1 -timeout 15m ./... -covermode=atomic
        env:
          SFTPXY_DATA_PROVIDER__DRIVER: mysql
          SFTPXY_DATA_PROVIDER__NAME: SFTPxy
          SFTPXY_DATA_PROVIDER__HOST: localhost
          SFTPXY_DATA_PROVIDER__PORT: 3308
          SFTPXY_DATA_PROVIDER__USERNAME: SFTPxy
          SFTPXY_DATA_PROVIDER__PASSWORD: SFTPxy

      - name: Run tests using PostgreSQL provider
        run: |
          ./SFTPxy initprovider
          ./SFTPxy resetprovider --force
          go test -v -tags nopgxregisterdefaulttypes,disable_grpc_modules -p 1 -timeout 15m ./... -covermode=atomic
        env:
          SFTPXY_DATA_PROVIDER__DRIVER: postgresql
          SFTPXY_DATA_PROVIDER__NAME: SFTPxy
          SFTPXY_DATA_PROVIDER__HOST: localhost
          SFTPXY_DATA_PROVIDER__PORT: 5432
          SFTPXY_DATA_PROVIDER__USERNAME: postgres
          SFTPXY_DATA_PROVIDER__PASSWORD: postgres

      - name: Run tests using MariaDB provider
        run: |
          ./SFTPxy initprovider
          ./SFTPxy resetprovider --force
          go test -v -tags nopgxregisterdefaulttypes,disable_grpc_modules -p 1 -timeout 15m ./... -covermode=atomic
        env:
          SFTPXY_DATA_PROVIDER__DRIVER: mysql
          SFTPXY_DATA_PROVIDER__NAME: SFTPxy
          SFTPXY_DATA_PROVIDER__HOST: localhost
          SFTPXY_DATA_PROVIDER__PORT: 3307
          SFTPXY_DATA_PROVIDER__USERNAME: SFTPxy
          SFTPXY_DATA_PROVIDER__PASSWORD: SFTPxy
          SFTPXY_DATA_PROVIDER__SQL_TABLES_PREFIX: prefix_

      - name: Run tests using CockroachDB provider
        run: |
          docker run --rm --name crdb --health-cmd "curl -I http://127.0.0.1:8080" --health-interval 10s --health-timeout 5s --health-retries 6 -p 26257:26257 -d cockroachdb/cockroach:latest start-single-node --insecure --listen-addr :26257
          sleep 10
          docker exec crdb cockroach sql --insecure -e 'create database "SFTPxy"'
          ./SFTPxy initprovider
          ./SFTPxy resetprovider --force
          go test -v -tags nopgxregisterdefaulttypes,disable_grpc_modules -p 1 -timeout 15m ./... -covermode=atomic
          docker stop crdb
        env:
          SFTPXY_DATA_PROVIDER__DRIVER: cockroachdb
          SFTPXY_DATA_PROVIDER__NAME: SFTPxy
          SFTPXY_DATA_PROVIDER__HOST: localhost
          SFTPXY_DATA_PROVIDER__PORT: 26257
          SFTPXY_DATA_PROVIDER__USERNAME: root
          SFTPXY_DATA_PROVIDER__PASSWORD:
          SFTPXY_DATA_PROVIDER__TARGET_SESSION_ATTRS: any
          SFTPXY_DATA_PROVIDER__SQL_TABLES_PREFIX: prefix_

  build-linux-packages:
    name: Build Linux packages
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            distro: ubuntu:18.04
            go: latest
            go-arch: amd64
          - arch: aarch64
            distro: ubuntu18.04
            go: latest
            go-arch: arm64
          - arch: ppc64le
            distro: ubuntu18.04
            go: latest
            go-arch: ppc64le
          - arch: armv7
            distro: ubuntu18.04
            go: latest
            go-arch: arm7
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get commit SHA
        id: get_commit
        run: echo "COMMIT=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Build on amd64
        if: ${{ matrix.arch == 'amd64' }}
        run: |
          echo '#!/bin/bash' > build.sh
          echo '' >> build.sh
          echo 'set -e' >> build.sh
          echo 'apt-get update -q -y' >> build.sh
          echo 'apt-get install -q -y curl gcc' >> build.sh
          if [ ${{ matrix.go }} == 'latest' ]
          then
            echo 'GO_VERSION=$(curl -L https://go.dev/VERSION?m=text | head -n 1)' >> build.sh
          else
            echo 'GO_VERSION=${{ matrix.go }}' >> build.sh
          fi
          echo 'GO_DOWNLOAD_ARCH=${{ matrix.go-arch }}' >> build.sh
          echo 'curl --retry 5 --retry-delay 2 --connect-timeout 10 -o go.tar.gz -L https://go.dev/dl/${GO_VERSION}.linux-${GO_DOWNLOAD_ARCH}.tar.gz' >> build.sh
          echo 'tar -C /usr/local -xzf go.tar.gz' >> build.sh
          echo 'export PATH=$PATH:/usr/local/go/bin' >> build.sh
          echo 'go version' >> build.sh
          echo 'cd /usr/local/src' >> build.sh
          echo 'go build -buildvcs=false -trimpath -tags nopgxregisterdefaulttypes,disable_grpc_modules -ldflags "-s -w -X github.com/jincaiw/sftpxy/v2/internal/version.commit=${{ steps.get_commit.outputs.COMMIT }} -X github.com/jincaiw/sftpxy/v2/internal/version.date=`date -u +%FT%TZ`" -o SFTPxy' >> build.sh

          chmod 755 build.sh
          docker run --rm --name ubuntu-build --mount type=bind,source=`pwd`,target=/usr/local/src ${{ matrix.distro }} /usr/local/src/build.sh
          mkdir -p output/{init,bash_completion,zsh_completion}
          cp SFTPxy.json output/
          cp -r templates output/
          cp -r static output/
          cp -r openapi output/
          cp init/SFTPxy.service output/init/
          ./SFTPxy gen completion bash > output/bash_completion/SFTPxy
          ./SFTPxy gen completion zsh > output/zsh_completion/_SFTPxy
          ./SFTPxy gen man -d output/man/man1
          gzip output/man/man1/*
          cp SFTPxy output/

      - uses: uraimo/run-on-arch-action@v3
        if: ${{ matrix.arch != 'amd64' }}
        name: Build for ${{ matrix.arch }}
        id: build
        with:
          arch: ${{ matrix.arch }}
          distro: ${{ matrix.distro }}
          setup: |
            mkdir -p "${PWD}/output"
          dockerRunArgs: |
            --volume "${PWD}/output:/output"
          shell: /bin/bash
          install: |
            apt-get update -q -y
            apt-get install -q -y curl gcc
            if [ ${{ matrix.go }} == 'latest' ]
            then
              GO_VERSION=$(curl -L https://go.dev/VERSION?m=text | head -n 1)
            else
              GO_VERSION=${{ matrix.go }}
            fi
            GO_DOWNLOAD_ARCH=${{ matrix.go-arch }}
            if [ ${{ matrix.arch}} == 'armv7' ]
            then
              GO_DOWNLOAD_ARCH=armv6l
            fi
            curl --retry 5 --retry-delay 2 --connect-timeout 10 -o go.tar.gz -L https://go.dev/dl/${GO_VERSION}.linux-${GO_DOWNLOAD_ARCH}.tar.gz
            tar -C /usr/local -xzf go.tar.gz
          run: |
            export PATH=$PATH:/usr/local/go/bin
            go version
            if [ ${{ matrix.arch}} == 'armv7' ]
            then
              export GOARM=7
            fi
            go build -buildvcs=false -trimpath -tags nopgxregisterdefaulttypes,disable_grpc_modules -ldflags "-s -w -X github.com/jincaiw/sftpxy/v2/internal/version.commit=${{ steps.get_commit.outputs.COMMIT }} -X github.com/jincaiw/sftpxy/v2/internal/version.date=`date -u +%FT%TZ`" -o SFTPxy
            mkdir -p output/{init,bash_completion,zsh_completion}
            cp SFTPxy.json output/
            cp -r templates output/
            cp -r static output/
            cp -r openapi output/
            cp init/SFTPxy.service output/init/
            ./SFTPxy gen completion bash > output/bash_completion/SFTPxy
            ./SFTPxy gen completion zsh > output/zsh_completion/_SFTPxy
            ./SFTPxy gen man -d output/man/man1
            gzip output/man/man1/*
            cp SFTPxy output/

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: SFTPxy-linux-${{ matrix.arch }}-go-${{ matrix.go }}
          path: output

      - name: Build Packages
        id: build_linux_pkgs
        run: |
          export NFPM_ARCH=${{ matrix.go-arch }}
          cd pkgs
          ./build.sh
          PKG_VERSION=$(cat dist/version)
          echo "pkg-version=${PKG_VERSION}" >> $GITHUB_OUTPUT

      - name: Upload Debian Package
        uses: actions/upload-artifact@v7
        with:
          name: SFTPxy-${{ steps.build_linux_pkgs.outputs.pkg-version }}-${{ matrix.go-arch }}-deb
          path: pkgs/dist/deb/*

      - name: Upload RPM Package
        uses: actions/upload-artifact@v7
        with:
          name: SFTPxy-${{ steps.build_linux_pkgs.outputs.pkg-version }}-${{ matrix.go-arch }}-rpm
          path: pkgs/dist/rpm/*

  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
      - uses: actions/checkout@v6
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
